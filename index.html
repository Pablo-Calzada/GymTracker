<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymTracker - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Paleta corporativa del Entregable 3 */
        body { background-color: #FFFFFF; color: #000000; }
        .navbar-custom { background-color: #000000; padding: 10px 0; }
        .navbar-custom .navbar-brand { 
            color: #FFFFFF; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
        }
        .logo-tfg {
            height: 50px;
            width: auto;
            margin-right: 15px;
        }
        .card-custom { border: 2px solid #666666; border-radius: 0; }
        .btn-custom { background-color: #000000; color: #FFFFFF; border-radius: 0; }
        .btn-custom:hover { background-color: #333333; color: #FFFFFF; }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="logo.png" alt="GymTracker Logo" class="logo-tfg">
                GYMTRACKER
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Catálogo de Ejercicios</h2>
            <button class="btn btn-custom px-4">Registrar Entrenamiento</button>
        </div>

        <div id="cargando" class="text-center my-5">
            <div class="spinner-border text-dark" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-secondary">Conectando con la base de datos de ejercicios...</p>
        </div>

        <div id="mensaje-error" class="alert alert-danger d-none" role="alert"></div>

        <div class="row" id="contenedor-ejercicios">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contenedor = document.getElementById('contenedor-ejercicios');
            const cargando = document.getElementById('cargando');
            const mensajeError = document.getElementById('mensaje-error');

            fetch('api/ejercicios.php')
                .then(response => {
                    if (!response.ok) throw new Error('Error en la conexión');
                    return response.json();
                })
                .then(datos => {
                    cargando.classList.add('d-none');
                    datos.data.forEach(ejercicio => {
                        const tarjetaHTML = `
                            <div class="col-md-6 mb-4">
                                <div class="card card-custom h-100 p-3 shadow-sm">
                                    <div class="card-body">
                                        <h5 class="card-title fw-bold text-uppercase">${ejercicio.nombre}</h5>
                                        <h6 class="card-subtitle mb-3 text-muted">Músculo: ${ejercicio.grupoMuscular}</h6>
                                        <p class="card-text text-secondary">${ejercicio.descripcion}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                        contenedor.innerHTML += tarjetaHTML;
                    });
                })
                .catch(error => {
                    cargando.classList.add('d-none');
                    mensajeError.textContent = '❌ No se pudo conectar con el servidor. Revisa XAMPP.';
                    mensajeError.classList.remove('d-none');
                    console.error(error);
                });
        });
    </script>
</body>
</html>
